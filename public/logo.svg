<svg width="300" height="300" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="150" cy="150" r="148" fill="#1a5c50"/>
  
  <!-- Outer ring border -->
  <circle cx="150" cy="150" r="140" fill="none" stroke="#7ec87a" stroke-width="2.5"/>
  <circle cx="150" cy="150" r="115" fill="none" stroke="#7ec87a" stroke-width="1.5"/>

  <!-- Top arc text: NELLAI VELMURUGAN STORE -->
  <path id="topArc" fill="none" d="M 35,150 A 115,115 0 1,1 265,150"/>
  <text font-family="Arial, sans-serif" font-weight="900" font-size="17" fill="#a8e6a3" letter-spacing="2">
    <textPath href="#topArc" startOffset="8%">NELLAI VELMURUGAN STORE</textPath>
  </text>

  <!-- Bottom arc text: FRESHNESS DELIVERED DAILY -->
  <path id="bottomArc" fill="none" d="M 45,165 A 110,110 0 0,0 255,165"/>
  <text font-family="Arial, sans-serif" font-weight="700" font-size="14" fill="#a8e6a3" letter-spacing="1.5">
    <textPath href="#bottomArc" startOffset="10%">FRESHNESS DELIVERED DAILY</textPath>
  </text>

  <!-- Stars -->
  <text x="42" y="158" font-size="14" fill="#a8e6a3">?</text>
  <text x="244" y="158" font-size="14" fill="#a8e6a3">?</text>

  <!-- Store body -->
  <rect x="108" y="165" width="84" height="52" rx="2" fill="none" stroke="#a8e6a3" stroke-width="2.5"/>
  <!-- Door -->
  <rect x="136" y="179" width="28" height="38" rx="2" fill="none" stroke="#a8e6a3" stroke-width="2"/>
  <!-- Awning base -->
  <rect x="100" y="148" width="100" height="8" rx="2" fill="none" stroke="#a8e6a3" stroke-width="2"/>
  <!-- Awning scallops -->
  <path d="M100,156 Q108,168 116,156 Q124,168 132,156 Q140,168 148,156 Q156,168 164,156 Q172,168 180,156 Q188,168 196,156 Q204,168 200,156" fill="none" stroke="#a8e6a3" stroke-width="2"/>
  <!-- Awning roof lines -->
  <line x1="116" y1="148" x2="110" y2="130" stroke="#a8e6a3" stroke-width="1.5"/>
  <line x1="126" y1="148" x2="122" y2="130" stroke="#a8e6a3" stroke-width="1.5"/>
  <line x1="136" y1="148" x2="134" y2="130" stroke="#a8e6a3" stroke-width="1.5"/>
  <line x1="150" y1="148" x2="150" y2="130" stroke="#a8e6a3" stroke-width="1.5"/>
  <line x1="164" y1="148" x2="166" y2="130" stroke="#a8e6a3" stroke-width="1.5"/>
  <line x1="174" y1="148" x2="178" y2="130" stroke="#a8e6a3" stroke-width="1.5"/>
  <line x1="184" y1="148" x2="190" y2="130" stroke="#a8e6a3" stroke-width="1.5"/>
  <!-- Awning top ridge -->
  <line x1="116" y1="130" x2="184" y2="130" stroke="#a8e6a3" stroke-width="2"/>
  <!-- Roof peak -->
  <polyline points="108,130 150,112 192,130" fill="none" stroke="#a8e6a3" stroke-width="2"/>
</svg>
